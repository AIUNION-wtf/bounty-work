name: Sync Claim Status

# Triggered by AIUNION API webhook via repository_dispatch
# Register with: POST https://api.aiunion.wtf/webhook/register
# { "url": "https://api.github.com/repos/AIUNION-wtf/bounty-work/dispatches",
#   "btc_address": "<your_btc_address>",
#   "auth_token": "<github_pat>",
#   "events": ["claim_reviewed"] }
#
# The AIUNION API sends a claim_reviewed payload with:
#   claim_id, bounty_id, bounty_title, outcome, claimant_name,
#   amount_usd, amount_btc, submission_url, reviewed_at,
#   payment_status, payment_txid, message

on:
  repository_dispatch:
      types: [claim_reviewed]

      permissions:
        contents: write

        jobs:
          sync-claim-status:
              runs-on: ubuntu-latest
                  steps:
                        - name: Checkout repository
                                uses: actions/checkout@v4

                                      - name: Extract webhook payload
                                              id: payload
                                                      run: |
                                                                CLAIM_ID="${{ github.event.client_payload.claim_id }}"
                                                                          BOUNTY_ID="${{ github.event.client_payload.bounty_id }}"
                                                                                    BOUNTY_TITLE="${{ github.event.client_payload.bounty_title }}"
                                                                                              OUTCOME="${{ github.event.client_payload.outcome }}"
                                                                                                        CLAIMANT="${{ github.event.client_payload.claimant_name }}"
                                                                                                                  AMOUNT_USD="${{ github.event.client_payload.amount_usd }}"
                                                                                                                            AMOUNT_BTC="${{ github.event.client_payload.amount_btc }}"
                                                                                                                                      REVIEWED_AT="${{ github.event.client_payload.reviewed_at }}"
                                                                                                                                                PAYMENT_STATUS="${{ github.event.client_payload.payment_status }}"
                                                                                                                                                          PAYMENT_TXID="${{ github.event.client_payload.payment_txid }}"
                                                                                                                                                          
                                                                                                                                                                    echo "claim_id=$CLAIM_ID" >> $GITHUB_OUTPUT
                                                                                                                                                                              echo "bounty_id=$BOUNTY_ID" >> $GITHUB_OUTPUT
                                                                                                                                                                                        echo "bounty_title=$BOUNTY_TITLE" >> $GITHUB_OUTPUT
                                                                                                                                                                                                  echo "outcome=$OUTCOME" >> $GITHUB_OUTPUT
                                                                                                                                                                                                            echo "claimant=$CLAIMANT" >> $GITHUB_OUTPUT
                                                                                                                                                                                                                      echo "amount_usd=$AMOUNT_USD" >> $GITHUB_OUTPUT
                                                                                                                                                                                                                                echo "amount_btc=$AMOUNT_BTC" >> $GITHUB_OUTPUT
                                                                                                                                                                                                                                          echo "reviewed_at=$REVIEWED_AT" >> $GITHUB_OUTPUT
                                                                                                                                                                                                                                                    echo "payment_status=$PAYMENT_STATUS" >> $GITHUB_OUTPUT
                                                                                                                                                                                                                                                              echo "payment_txid=$PAYMENT_TXID" >> $GITHUB_OUTPUT
                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                    - name: Check bounty folder exists
                                                                                                                                                                                                                                                                            id: check_folder
                                                                                                                                                                                                                                                                                    run: |
                                                                                                                                                                                                                                                                                              BOUNTY_ID="${{ steps.payload.outputs.bounty_id }}"
                                                                                                                                                                                                                                                                                                        if [ -d "$BOUNTY_ID" ]; then
                                                                                                                                                                                                                                                                                                                    echo "exists=true" >> $GITHUB_OUTPUT
                                                                                                                                                                                                                                                                                                                              else
                                                                                                                                                                                                                                                                                                                                          echo "exists=false" >> $GITHUB_OUTPUT
                                                                                                                                                                                                                                                                                                                                                      echo "No folder found for $BOUNTY_ID — skipping CLAIM.md update."
                                                                                                                                                                                                                                                                                                                                                                fi
                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                      - name: Fetch full claim data from AIUNION API
                                                                                                                                                                                                                                                                                                                                                                              if: steps.check_folder.outputs.exists == 'true'
                                                                                                                                                                                                                                                                                                                                                                                      id: claim_data
                                                                                                                                                                                                                                                                                                                                                                                              run: |
                                                                                                                                                                                                                                                                                                                                                                                                        CLAIM_ID="${{ steps.payload.outputs.claim_id }}"
                                                                                                                                                                                                                                                                                                                                                                                                                  CLAIM_JSON=$(curl -sf "https://api.aiunion.wtf/claim/$CLAIM_ID" || echo "{}")
                                                                                                                                                                                                                                                                                                                                                                                                                            echo "claim_json<<EOF" >> $GITHUB_OUTPUT
                                                                                                                                                                                                                                                                                                                                                                                                                                      echo "$CLAIM_JSON" >> $GITHUB_OUTPUT
                                                                                                                                                                                                                                                                                                                                                                                                                                                echo "EOF" >> $GITHUB_OUTPUT
                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                      - name: Write updated CLAIM.md
                                                                                                                                                                                                                                                                                                                                                                                                                                                              if: steps.check_folder.outputs.exists == 'true'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                      run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                BOUNTY_ID="${{ steps.payload.outputs.bounty_id }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          CLAIM_ID="${{ steps.payload.outputs.claim_id }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    OUTCOME="${{ steps.payload.outputs.outcome }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              CLAIMANT="${{ steps.payload.outputs.claimant }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        REVIEWED_AT="${{ steps.payload.outputs.reviewed_at }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  PAYMENT_STATUS="${{ steps.payload.outputs.payment_status }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            PAYMENT_TXID="${{ steps.payload.outputs.payment_txid }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      AMOUNT_BTC="${{ steps.payload.outputs.amount_btc }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                AMOUNT_USD="${{ steps.payload.outputs.amount_usd }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          # Capitalise outcome for display
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    STATUS_DISPLAY=$(echo "$OUTCOME" | sed 's/./\u&/')
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              CLAIM_MD="# CLAIM.md
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        **Bounty ID:** $BOUNTY_ID
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  **Claim ID:** $CLAIM_ID
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            **Claimant:** $CLAIMANT
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      **Claimant Type:** ai_agent
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                **Status:** $OUTCOME
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          **Reviewed At:** $REVIEWED_AT
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    **Payment Status:** $PAYMENT_STATUS"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              if [ -n "$PAYMENT_TXID" ] && [ "$PAYMENT_TXID" != "null" ] && [ "$PAYMENT_TXID" != "" ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          CLAIM_MD="$CLAIM_MD
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    **Payment TXID:** $PAYMENT_TXID
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              **Amount Paid:** $AMOUNT_BTC BTC (\$$AMOUNT_USD USD)"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  # De-indent heredoc (strip leading spaces added by YAML indentation)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            echo "$CLAIM_MD" | sed 's/^          //' > "$BOUNTY_ID/CLAIM.md"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      echo "CLAIM.md written for $BOUNTY_ID"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                cat "$BOUNTY_ID/CLAIM.md"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - name: Update README.md completed bounties table
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              if: >
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        steps.check_folder.outputs.exists == 'true' &&
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  steps.payload.outputs.outcome == 'approved'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    BOUNTY_ID="${{ steps.payload.outputs.bounty_id }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              CLAIM_ID="${{ steps.payload.outputs.claim_id }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        BOUNTY_TITLE="${{ steps.payload.outputs.bounty_title }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  # Check if this bounty is already in the README table
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if grep -q "$BOUNTY_ID" README.md; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        # Update the status cell from Submitted/pending to Approved
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    sed -i "s/| \[$BOUNTY_ID\]([^)]*) | .* | .* | Submitted | .*/| [$BOUNTY_ID]($BOUNTY_ID\/) | $BOUNTY_TITLE | Claude | Approved | $CLAIM_ID |/" README.md
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                echo "Updated existing row for $BOUNTY_ID in README.md"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      # Insert a new row after the last table row (line containing claim_)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  NEW_ROW="| [$BOUNTY_ID]($BOUNTY_ID\/) | $BOUNTY_TITLE | Claude | Approved | $CLAIM_ID |"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              # Find the last line of the table and append after it
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          LAST_TABLE_LINE=$(grep -n "| claim_" README.md | tail -1 | cut -d: -f1)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      if [ -n "$LAST_TABLE_LINE" ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    sed -i "${LAST_TABLE_LINE}a $NEW_ROW" README.md
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  echo "Added new row for $BOUNTY_ID to README.md after line $LAST_TABLE_LINE"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            echo "Could not locate table in README.md — skipping row insertion"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - name: Commit changes
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if: steps.check_folder.outputs.exists == 'true'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  git config user.name "github-actions[bot]"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            git config user.email "github-actions[bot]@users.noreply.github.com"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      git add .
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if git diff --cached --quiet; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            echo "No changes to commit."
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  BOUNTY_ID="${{ steps.payload.outputs.bounty_id }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              OUTCOME="${{ steps.payload.outputs.outcome }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          CLAIM_ID="${{ steps.payload.outputs.claim_id }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      git commit -m "chore($BOUNTY_ID): auto-update CLAIM.md — claim $CLAIM_ID $OUTCOME"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  git push
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              echo "Changes committed and pushed."
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        fi
